name: Release Windows

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA or branch to build (leave empty for current branch)'
        required: false
        default: ''
  push:
    tags:
      - 'v*-windows'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    # 只有推送 tag 时才创建 release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%-windows}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }} (Windows)
          draft: false
          prerelease: false
          body: |
            ## What's Changed (Windows Release)
            Download packages at: https://www.talkcody.com/docs/introduction/client-downloads

  build-windows:
    name: Build Windows MSI
    # 关键修复：推送 tag 时才依赖 create-release
    needs: ${{ github.event_name == 'push' && 'create-release' || '' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pw-windows-msvc

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Install jq and protoc
        run: |
          choco install jq -y
          choco install protoc -y

      - name: Build Tauri app (release)
        if: github.event_name == 'push'
        run: |
          jq '.bundle.createUpdaterArtifacts = true' src-tauri/tauri.conf.json > tauri.tmp
          mv tauri.tmp src-tauri/tauri.conf.json
          bun run tauri build
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (test build)
        if: github.event_name == 'workflow_dispatch'
        run: bun run tauri build
        shell: bash

      - name: Setup Node.js
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        if: github.event_name == 'push'
        run: npm install -g wrangler

      - name: Run release script
        if: github.event_name == 'push'
        run: |
          $env:PLATFORM = "windows"
          $env:ARCH = "x86_64"
          $env:VERSION = "${{ needs.create-release.outputs.version || 'test' }}"
          bash .github/scripts/release.sh
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get MSI path
        id: get_msi
        run: |
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select -First 1
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload MSI (test build)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: talkcody-windows-${{ github.sha }}
          path: ${{ steps.get_msi.outputs.msi_path }}
          retention-days: 7

      - name: Upload MSI to release
        if: github.event_name == 'push'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_msi.outputs.msi_path }}
          asset_name: ${{ steps.get_msi.outputs.msi_name }}
          asset_content_type: application/octet-stream

      - name: Get updater bundle
        if: github.event_name == 'push'
        id: get_bundle
        run: |
          $bundle = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi.tar.gz" | Select -First 1
          echo "bundle_path=$($bundle.FullName)" >> $env:GITHUB_OUTPUT
          echo "bundle_name=$($bundle.Name)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload updater bundle
        if: github.event_name == 'push'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get_bundle.outputs.bundle_path }}
          asset_name: ${{ steps.get_bundle.outputs.bundle_name }}
          asset_content_type: application/gzip